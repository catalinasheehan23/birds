<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #fff7ef;
      color: #3b2a20;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .widget {
      width: 320px;
      padding: 20px;
      border-radius: 24px;
      background: #fffaf4;
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
      text-align: center;
    }

    img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 18px;
    }

    h2 {
      margin: 14px 0 4px;
      font-size: 24px;
    }

    p {
      margin: 0;
      font-size: 14px;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <div class="widget">
    <img id="birdImage" src="">
    <h2 id="birdName"></h2>
    <p>Bird of the Day</p>
  </div>

  <script>
    const birds = 
  {
    name: "Northern Cardinal",
    image: "https://upload.wikimedia.org/wikipedia/commons/5/5c/Cardinalis_cardinalis_male_2.jpg"
  },
  {
    name: "Blue Jay",
    image: "https://upload.wikimedia.org/wikipedia/commons/0/0a/Cyanocitta-cristata-004.jpg"
  },
  {
    name: "American Robin",
    image: "https://upload.wikimedia.org/wikipedia/commons/b/b8/Turdus-migratorius-002.jpg"
  },
  {
    name: "Barn Owl",
    image: "https://upload.wikimedia.org/wikipedia/commons/c/c4/Tyto_alba_close_up.jpg"
  },
  {
    name: "Atlantic Puffin",
    image: "https://upload.wikimedia.org/wikipedia/commons/c/c4/Atlantic_Puffin_Fratercula_arctica.jpg"
  },
  {
    name: "Scarlet Macaw",
    image: "https://upload.wikimedia.org/wikipedia/commons/5/55/Scarlet_Macaw_and_Blue-and-yellow_Macaw.jpg"
  },
  {
    name: "Peacock",
    image: "https://upload.wikimedia.org/wikipedia/commons/c/c5/Peacock_Plumage.jpg"
  },
  {
    name: "Flamingo",
    image: "https://upload.wikimedia.org/wikipedia/commons/9/99/Flamingos_Laguna_Colorada.jpg"
  },
  {
    name: "Bald Eagle",
    image: "https://upload.wikimedia.org/wikipedia/commons/1/1e/Bald_Eagle_Portrait.jpg"
  },
  {
    name: "Kingfisher",
    image: "https://upload.wikimedia.org/wikipedia/commons/9/92/Common_Kingfisher_Alcedo_atthis.jpg"
  }
];

    const today = new Date();
    const start = new Date(today.getFullYear(), 0, 0);
    const diff = today - start;
    const oneDay = 1000 * 60 * 60 * 24;
    const dayOfYear = Math.floor(diff / oneDay);

    const bird = birds[dayOfYear % birds.length];

    document.getElementById("birdImage").src = bird.image;
    document.getElementById("birdName").textContent = bird.name;
  </script>
</body>
</html>
