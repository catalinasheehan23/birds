<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #fff7ef;
      color: #3b2a20;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .widget {
      width: 320px;
      padding: 22px;
      border-radius: 24px;
      background: #fffaf4;
      box-shadow: 0 12px 30px rgba(80, 55, 40, 0.15);
      text-align: center;
    }

    img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 18px;
      background: #f3e7db;
    }

    h2 {
      margin: 14px 0 4px;
      font-size: 24px;
    }

    p {
      margin: 0 0 14px;
      font-size: 14px;
      opacity: 0.75;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      background: #d9b99b;
      color: #3b2a20;
      font-family: Georgia, serif;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #cfa987;
    }
  </style>
</head>

<body>
  <div class="widget">
    <img id="birdImage" alt="Bird of the day">
    <h2 id="birdName"></h2>
    <p>Bird of the Day</p>
    <button onclick="newBird()">New Bird</button>
  </div>

  <script>
    const birds = [
      {
        name: "Blue Jay",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Blue_Jay_%28Cyanocitta_cristata%29.jpg"

      {
        name: "American Robin",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/American_Robin.jpg"
      },
      {
        name: "Barn Owl",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Tyto_alba_close_up.jpg"
      },
      {
        name: "Atlantic Puffin",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Atlantic_Puffin_Fratercula_arctica.jpg"
      },
      { 
        name: "Scarlet Macaw",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Scarlet_Macaw_and_Blue-and-yellow_Macaw.jpg/800px-Scarlet_Macaw_and_Blue-and-yellow_Macaw.jpg"
      }
      {
        name: "Peacock",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Peacock_Plumage.jpg"
      },
      {
        name: "Flamingo",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Flamingos_Laguna_Colorada.jpg"
      },
      {
        name: "Bald Eagle",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Bald_Eagle_Portrait.jpg"
      },
      {
        name: "Common Kingfisher",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Common_Kingfisher_Alcedo_atthis.jpg"
      },
      {
        name: "Snowy Owl",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Snowy_Owl.jpg"
      },
      {
        name: "Mandarin Duck",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Mandarin.duck.arp.jpg"
      },
      {
        name: "Ruby-throated Hummingbird",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Ruby-throated_Hummingbird.jpg"
      },
      {
        name: "American Goldfinch",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/American_Goldfinch.jpg"
      },
      {
        name: "Roseate Spoonbill",
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Roseate_Spoonbill.jpg"
      }
      {
        name: "European Robin",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Erithacus_rubecula_with_cocked_head.jpg/800px-Erithacus_rubecula_with_cocked_head.jpg"
      },
      {
        name: "Toucan",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Ramphastos_toco.jpg/800px-Ramphastos_toco.jpg"
      },
      {
        name: "Cockatiel",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Nymphicus_hollandicus_-perching_on_branch.jpg/800px-Nymphicus_hollandicus_-perching_on_branch.jpg"
      },
      {
        name: "Parakeet",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Budgerigar_006.jpg/800px-Budgerigar_006.jpg"
      },
      {

      },
      {
        name: "Cedar Waxwing",

      {
        name: "Eastern Bluebird",

      },
      {

      },
      {

      },
      {
        name: "Black-capped Chickadee",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Black-capped_Chickadee.jpg/800px-Black-capped_Chickadee.jpg"
      },
      {
        name: "Burrowing Owl",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Burrowing_Owl.jpg/800px-Burrowing_Owl.jpg"
      },
      {
        name: "Rainbow Lorikeet",
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Rainbow_Lorikeet.jpg/800px-Rainbow_Lorikeet.jpg"
      },
     ];

    function showBird(index) {
      const bird = birds[index];
      document.getElementById("birdImage").src = bird.image;
      document.getElementById("birdName").textContent = bird.name;
    }

    function birdOfTheDay() {
      const today = new Date();
      const start = new Date(today.getFullYear(), 0, 0);
      const diff = today - start;
      const day = Math.floor(diff / 86400000);
      showBird(day % birds.length);
    }

    function newBird() {
      const randomIndex = Math.floor(Math.random() * birds.length);
      showBird(randomIndex);
    }

    birdOfTheDay();
  </script>
</body>
</html>
