<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #fff7ef;
      color: #3b2a20;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .widget {
      width: 320px;
      padding: 22px;
      border-radius: 24px;
      background: #fffaf4;
      box-shadow: 0 12px 30px rgba(80, 55, 40, 0.15);
      text-align: center;
    }

    img {
      width: 100%;
      height: 220px;
      object-fit: contain;
      border-radius: 18px;
      background: #f3e7db;
    }

    h2 {
      margin: 14px 0 4px;
      font-size: 24px;
    }

  p {
      margin: 0 0 14px;
      font-size: 14px;
      opacity: 0.75;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      background: #d9b99b;
      color: #3b2a20;
      font-family: Georgia, serif;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #cfa987;
    }
  </style>
</head>

<body>
  <div class="widget">
    <img id="birdImage" alt="Bird of the day">
    <h2 id="birdName"></h2>
    <p>Bird of the Day</p>
    <button onclick="newBird()">New Bird</button>
  </div>
<script>
  const birds = [
    "Blue jay",
    "American robin",
    "Barn owl",
    "Atlantic puffin",
    "Scarlet macaw",
    "Indian peafowl",
    "Flamingo",
    "Bald eagle",
    "Common kingfisher",
    "Snowy owl",
    "Mandarin duck",
    "Ruby-throated hummingbird",
    "American goldfinch",
    "Roseate spoonbill",
    "European robin",
    "Toco toucan",
    "Cockatiel",
    "Budgerigar",
    "Great horned owl",
    "Red-tailed hawk",
    "Cedar waxwing",
    "Eastern bluebird",
    "Sun conure",
    "Laughing kookaburra",
    "Mute swan",
    "Emperor penguin",
    "Black-capped chickadee",
    "Burrowing owl",
    "Rainbow lorikeet"
  ];

  async function showBird(index) {
    const birdName = birds[index];
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(birdName)}`;

    try {
      const response = await fetch(url);
      const data = await response.json();

      document.getElementById("birdName").textContent = birdName;
      document.getElementById("birdImage").src =
        data.thumbnail?.source ||
        "https://upload.wikimedia.org/wikipedia/commons/3/32/House_sparrow04.jpg";
    } catch (error) {
      document.getElementById("birdName").textContent = birdName;
      document.getElementById("birdImage").alt = "Image could not load";
    }
  }

  function birdOfTheDay() {
    const today = new Date();
    const start = new Date(today.getFullYear(), 0, 0);
    const diff = today - start;
    const day = Math.floor(diff / 86400000);
    showBird(day % birds.length);
  }

  function newBird() {
    const randomIndex = Math.floor(Math.random() * birds.length);
    showBird(randomIndex);
  }

  birdOfTheDay();
</script>
</body>
</html>
